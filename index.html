<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数字转中文金额</title>
<script src="./nzh.js"></script>
</head>

<body style="margin:0;font-family:sans-serif;">

<!-- 顶部（固定结构，不会被历史挤） -->
<div style="max-width:480px;margin:0 auto;padding:20px;box-sizing:border-box;">

  <h2 style="margin-top:10px;">数字转中文金额</h2>

  <input id="num" inputmode="decimal" placeholder="输入数字"
    style="width:100%;padding:10px;font-size:16px;box-sizing:border-box;" />

  <br><br>

  <button onclick="convert()">转换</button>

  <!-- 结果（点击复制） -->
  <p id="result"
     style="margin-top:20px;font-size:26px;font-weight;word-break:break-all;cursor:pointer;line-height:1.4;"></p>

  <!-- 提示 -->
  <p id="toast" style="height:18px;font-size:13px;"></p>

</div>

<hr>

<!-- 历史区域（独立，不影响上方布局） -->
<div style="max-width:480px;margin:0 auto;padding:0 20px 40px;box-sizing:border-box;">

  <b>历史</b>
  <div id="history"></div>

</div>

<script>

// ===== 转换（仅金额 + 简体）=====

// ===== 输入校验 =====
function validateInput(val){

  if(!val) return '请输入数字';

  // 去掉空格
  val = val.trim();

  // 基础格式校验
  if(!/^-?\d+(\.\d+)?$/.test(val)){
    return '格式错误';
  }

  // 限制长度（防止极大数）
  const pure = val.replace('-', '').replace('.', '');
  if(pure.length > 16){
    return '数字过大';
  }

  // 小数位限制（金额一般最多2位）
  if(val.includes('.')){
    const decimal = val.split('.')[1];
    if(decimal.length > 2){
      return '最多支持2位小数';
    }
  }

  return null; // 合法
}


// ===== 转换 =====
function convert(){
  const inputEl = document.getElementById('num');
  let val = inputEl.value;

  const error = validateInput(val);

  if(error){
    setResult(error);
    return;
  }

  let res = '';

  try{
    res = Nzh.cn.toMoney(val);
  }catch{
    setResult('转换失败');
    return;
  }

  setResult(res);
  saveHistory(val, res);
}


// ===== 结果 =====
function setResult(text){
  document.getElementById('result').innerText = text;
}

// 点击复制
document.getElementById('result').addEventListener('click', ()=>{
  const text = document.getElementById('result').innerText;
  if(!text) return;

  navigator.clipboard.writeText(text)
    .then(()=> showToast('已复制'))
    .catch(()=> showToast('复制失败'));
});

// ===== toast =====
let t;
function showToast(msg){
  const el = document.getElementById('toast');
  el.innerText = msg;
  clearTimeout(t);
  t = setTimeout(()=> el.innerText='', 1000);
}

// ===== 历史 =====
const KEY = 'nzh_history';

function saveHistory(input, output){
  let list = JSON.parse(localStorage.getItem(KEY) || '[]');

  // 去重
  list = list.filter(i => i.input !== input);

  list.unshift({input, output});

  list = list.slice(0,10);

  localStorage.setItem(KEY, JSON.stringify(list));
  renderHistory();
}

function renderHistory(){
  const list = JSON.parse(localStorage.getItem(KEY) || '[]');
  const el = document.getElementById('history');

  el.innerHTML = list.map(i =>
    `<div style="padding:6px 0;border-bottom:1px solid #ccc;cursor:pointer;">
      ${i.input} → ${i.output}
     </div>`
  ).join('');

  // 点击填充
  Array.from(el.children).forEach((div, idx)=>{
    div.onclick = ()=>{
      document.getElementById('num').value = list[idx].input;
    };
  });
}

// 初始化历史
renderHistory();

// ===== 自动跟随系统主题（无手动）=====
(function(){
  const dark = matchMedia('(prefers-color-scheme: dark)').matches;
  if(dark){
    document.body.style.background = '#111';
    document.body.style.color = '#eee';
  }else{
    document.body.style.background = '#fff';
    document.body.style.color = '#000';
  }
})();

</script>

</body>
</html>
