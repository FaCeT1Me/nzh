<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数字转中文大写金额</title>
<script src="./nzh.js"></script>
</head>

<body style="margin:0;font-family:sans-serif;">

<div style="max-width:480px;margin:0 auto;padding:20px;box-sizing:border-box;">

  <h2 style="margin-top:10px;">数字转中文大写金额</h2>

  <input id="num" inputmode="decimal" placeholder="输入数字，如 114514"
    autofocus
    style="width:100%;padding:10px;font-size:16px;box-sizing:border-box;" />

  <br><br>

  <button id="convertBtn" onclick="convert()">转换</button>

  <p id="result" role="status" aria-live="polite"
     style="margin-top:20px;font-size:46px;font-weight:700;word-break:break-all;cursor:pointer;line-height:1.4;transition:transform 0.15s ease;letter-spacing:0.5px">输入数字查看结果</p>

  <p id="toast" style="height:18px;font-size:13px;"></p>

</div>

<hr>

<div style="max-width:480px;margin:0 auto;padding:0 20px 40px;box-sizing:border-box;">

  <div style="display:flex; justify-content:space-between; align-items:center;">
    <b>历史</b>
    <span id="clearHistory" style="font-size:13px;color:#999;cursor:pointer;user-select:none;" title="清空全部历史">清空</span>
  </div>
  <div id="history"></div>
  <div id="historyEmpty" style="color:#999;padding:12px 0;display:none;">暂无历史记录</div>

</div>

<script>

// ========== 工具函数 ==========
const $ = id => document.getElementById(id);
const numInput = $('num');
const resultEl = $('result');
const toastEl = $('toast');
const historyDiv = $('history');
const historyEmpty = $('historyEmpty');
const clearHistoryBtn = $('clearHistory');

// 震动反馈
function haptic() {
  if (navigator.vibrate) {
    navigator.vibrate(15);
  }
}

// Toast 提示
let toastTimer;
function showToast(msg) {
  toastEl.textContent = msg;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toastEl.textContent = ''; }, 1200);
}

// 设置结果文本（不再有颜色变化）
function setResult(text) {
  resultEl.textContent = text;
}

// 输入框错误态视觉反馈（仅边框和阴影）
function setInputError(hasError) {
  if (hasError) {
    numInput.style.borderColor = 'crimson';
    numInput.style.boxShadow = '0 0 0 2px rgba(220,20,60,0.2)';
  } else {
    numInput.style.borderColor = '';
    numInput.style.boxShadow = '';
  }
}

// ========== 校验 ==========
function validateInput(val) {
  if (!val) return '请输入数字';
  val = val.trim();
  if (!/^-?\d+(\.\d+)?$/.test(val)) {
    return '格式错误';
  }
  const pure = val.replace('-', '').replace('.', '');
  if (pure.length > 16) {
    return '数字过大（最多16位整数）';
  }
  if (val.includes('.')) {
    const d = val.split('.')[1];
    if (d.length > 2) return '最多2位小数';
  }
  return null;
}

// ========== 核心转换（仅通过按钮或回车触发） ==========
function convert() {
  const val = numInput.value;
  const err = validateInput(val);

  if (err) {
    setResult(err);
    setInputError(true);
    haptic(); // 错误时震动提示
    return;
  }

  setInputError(false);
  try {
    const res = Nzh.cn.toMoney(val);
    setResult(res);
    saveHistory(val, res);
    haptic(); // 成功转换也轻轻震一下
  } catch (e) {
    setResult('转换失败');
    setInputError(true);
  }
}

// 回车触发（保留）
numInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    convert();
  }
});

// 注意：移除了 input 实时转换监听，不自动触发

// ========== 结果复制与反馈（无颜色变化） ==========
resultEl.addEventListener('click', () => {
  const text = resultEl.textContent;
  if (!text || text === '输入数字查看结果') return;

  navigator.clipboard.writeText(text)
    .then(() => {
      showToast('✓ 已复制');
      // 仅保留放大效果
      resultEl.style.transform = 'scale(1.06)';
      setTimeout(() => {
        resultEl.style.transform = 'scale(1)';
      }, 160);
      haptic();
    })
    .catch(() => {
      showToast('复制失败');
      haptic();
    });
});

// ========== 历史记录管理 ==========
const STORAGE_KEY = 'nzh_history_v2';

function saveHistory(input, output) {
  let list = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  // 去重：相同输入只保留最新
  list = list.filter(item => item.input !== input);
  list.unshift({
    input,
    output,
    time: Date.now()
  });
  // 最多保留20条
  list = list.slice(0, 20);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
  renderHistory();
}

function deleteHistoryItem(index) {
  let list = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  if (index >= 0 && index < list.length) {
    list.splice(index, 1);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
  }
  renderHistory();
  haptic();
}

function clearAllHistory() {
  if (confirm('确定要清空所有历史记录吗？')) {
    localStorage.removeItem(STORAGE_KEY);
    renderHistory();
    haptic();
  }
}

clearHistoryBtn.addEventListener('click', clearAllHistory);

// 历史记录键盘导航（上下箭头浏览历史，Esc 清空）
let historyNavIndex = -1;
numInput.addEventListener('keydown', e => {
  const list = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  if (list.length === 0) return;

  if (e.key === 'ArrowUp') {
    e.preventDefault();
    historyNavIndex = Math.min(historyNavIndex + 1, list.length - 1);
    fillFromHistory(historyNavIndex);
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    historyNavIndex = Math.max(historyNavIndex - 1, -1);
    if (historyNavIndex === -1) {
      numInput.value = '';
      setResult('输入数字查看结果');
      setInputError(false);
    } else {
      fillFromHistory(historyNavIndex);
    }
  } else if (e.key === 'Escape') {
    historyNavIndex = -1;
    numInput.value = '';
    setResult('输入数字查看结果');
    setInputError(false);
    numInput.blur();
  }
});

function fillFromHistory(index) {
  const list = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  if (index >= 0 && index < list.length) {
    numInput.value = list[index].input;
    convert();
  }
}

function renderHistory() {
  const list = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  historyDiv.innerHTML = '';

  if (list.length === 0) {
    historyEmpty.style.display = 'block';
  } else {
    historyEmpty.style.display = 'none';
    list.forEach((item, idx) => {
      const timeStr = new Date(item.time).toLocaleString('zh-CN', {
        month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit'
      });
      const div = document.createElement('div');
      div.style.cssText = 'padding:8px 0;border-bottom:1px solid #ccc;cursor:pointer;display:flex;justify-content:space-between;align-items:center;';
      
      const leftSpan = document.createElement('span');
      leftSpan.textContent = `${item.input} → ${item.output}`;
      leftSpan.style.flex = '1';
      leftSpan.style.wordBreak = 'break-all';
      
      const rightSpan = document.createElement('span');
      rightSpan.innerHTML = `<span style="color:#888;font-size:12px;margin-right:8px;">${timeStr}</span><span style="color:crimson;font-weight:bold;cursor:pointer;user-select:none;" title="删除">✕</span>`;
      
      // 点击删除
      rightSpan.querySelector('span:last-child').addEventListener('click', (e) => {
        e.stopPropagation();
        deleteHistoryItem(idx);
      });
      
      div.appendChild(leftSpan);
      div.appendChild(rightSpan);
      
      // 点击填充并转换
      div.addEventListener('click', () => {
        numInput.value = item.input;
        convert();
        historyNavIndex = idx; // 同步导航索引
        haptic();
      });
      
      historyDiv.appendChild(div);
    });
  }
}

// ========== 主题跟随系统 ==========
function applyTheme() {
  const dark = matchMedia('(prefers-color-scheme: dark)').matches;
  document.body.style.background = dark ? '#111' : '#fff';
  document.body.style.color = dark ? '#eee' : '#000';
}
applyTheme();
matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);

// ========== 初始化 ==========
renderHistory();

</script>

</body>
</html>
