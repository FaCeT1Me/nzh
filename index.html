<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>数字转中文</title>
  <script src="./nzh.js"></script>
  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: 50px auto;
    }
    input, button {
      font-size: 16px;
      padding: 8px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h2>数字转中文（nzh）</h2>

<input id="num" placeholder="输入数字，比如 123456" />
<br>
<button onclick="convert()">转换</button>

<p>结果：</p>
<p id="result"></p>

<script>
  const nzhcn = Nzh.cn;

  function convert() {
    const val = document.getElementById('num').value;
    document.getElementById('result').innerText =
      nzhcn.encodeB(val);
  }
</script>

</body>
</html>
