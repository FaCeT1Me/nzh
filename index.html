<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="bookmark" href="apple-touch-icon.png">
    <link rel="apple-touch-icon-precomposed" sizes="180x180" href="apple-touch-icon.png">
    <title>人民币大写转换</title>
    <script src="./nzh.js">
    </script>
    <style>
        #gameCanvas {
            display: block;
            width: 100%;
            max-width: 480px;
            background: #f7f7f7;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin-top: 8px;
            touch-action: none;
        }
        .dark-mode #gameCanvas {
            background: #2a2a2a;
            border-color: #444;
        }
        #gameTip {
            font-size: 13px;
            color: #888;
            text-align: center;
            margin: 6px 0 12px;
        }
        #gameScore, #gameHighScore {
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            margin: 4px 0;
            color: #333;
        }
        .dark-mode #gameScore, .dark-mode #gameHighScore {
            color: #eee;
        }
        #result {
            min-height: calc(46px * 1.4 * 2); /* 两行高度 */
        }
    </style>
</head>

<body style="margin:0;font-family:sans-serif;">

    <div style="max-width:480px;margin:0 auto;padding:20px;box-sizing:border-box;">

        <h2 style="margin-top:10px;">人民币大写转换</h2>

        <input id="num" inputmode="decimal" placeholder="输入数字，如 114514" autofocus
        style="width:100%;padding:10px;font-size:16px;box-sizing:border-box;" />

        <br><br>

        <button id="convertBtn" onclick="convert()">转换</button>

        <p id="result" role="status" aria-live="polite"
        style="margin-top:20px;margin-bottom:16px;font-size:46px;font-weight:700;word-break:break-all;cursor:pointer;line-height:1.4;transition:transform 0.15s ease;letter-spacing:0.5px">输入数字<br>查看结果</p>

        <p id="toast" style="height:18px;font-size:13px;"></p>

    </div>

    <hr>

    <div style="max-width:480px;margin:0 auto;padding:0 20px 40px;box-sizing:border-box;">

        <div style="display:flex; justify-content:space-between; align-items:center;">
            <b>历史</b>
            <span id="clearHistory" style="font-size:13px;color:#999;cursor:pointer;user-select:none;" title="清空全部历史">清空</span>
        </div>
        <div id="history"></div>
        <div id="historyEmpty" style="color:#999;padding:12px 0;display:none;">暂无历史记录</div>

        <!-- 小游戏折叠区域 -->
        <div id="gameHeader" style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;padding:8px 0;border-top:1px solid #ccc;margin-top:20px;">
            <span style="font-size:16px;font-weight:bold;">🎮 小游戏</span>
            <span id="gameToggle" style="font-size:18px;color:#666;">▶</span>
        </div>
        <div id="gameSection" style="display:none;max-width:480px;margin:0 auto;padding:0;box-sizing:border-box;">
            <canvas id="gameCanvas" width="480" height="200"></canvas>
            <div style="display:flex; justify-content:center; gap:40px; margin-top:6px;">
                <span id="gameScore">得分: 0</span>
                <span id="gameHighScore">最高分: 0</span>
            </div>
            <div id="gameTip">按空格键或点击画面跳跃</div>
        </div>
    </div>

    <script>
        // ========== 工具函数 ==========
        const $ = id => document.getElementById(id);
        const numInput = $('num');
        const resultEl = $('result');
        const toastEl = $('toast');
        const historyDiv = $('history');
        const historyEmpty = $('historyEmpty');
        const clearHistoryBtn = $('clearHistory');

        // ========== 千分位格式化 ==========
        function formatThousands(numStr) {
            if (!numStr) return numStr;
            numStr = numStr.replace(/,/g, '');
            let negative = false;
            if (numStr.startsWith('-')) {
                negative = true;
                numStr = numStr.substring(1);
            }
            const parts = numStr.split('.');
            const intPart = parts[0];
            const decPart = parts.length > 1 ? parts[1] : '';
            const formattedInt = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            let result = (negative ? '-' : '') + formattedInt;
            if (parts.length > 1) result += '.' + decPart;
            return result;
        }

        function unformatThousands(str) {
            return str ? str.replace(/,/g, '') : str;
        }

        function haptic() {
            if (navigator.vibrate) navigator.vibrate(15);
        }

        let toastTimer;
        function showToast(msg) {
            toastEl.textContent = msg;
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { toastEl.textContent = ''; }, 1200);
        }

        function setResult(text) {
            resultEl.innerHTML = text; // 允许换行，但不包含用户输入，安全
        }

        function setInputError(hasError) {
            if (hasError) {
                numInput.style.borderColor = 'crimson';
                numInput.style.boxShadow = '0 0 0 2px rgba(220,20,60,0.2)';
            } else {
                numInput.style.borderColor = '';
                numInput.style.boxShadow = '';
            }
        }

        // ========== 校验 ==========
        function validateInput(val) {
            if (!val) return '请输入数字';
            val = val.trim();
            val = unformatThousands(val).replace(/。/g, '.');
            if (!/^-?\d+(\.\d+)?$/.test(val)) return '格式错误';
            const pure = val.replace('-', '').replace('.', '');
            if (pure.length > 16) return '数字过大（最多16位整数）';
            if (val.includes('.')) {
                const d = val.split('.')[1];
                if (d.length > 2) return '最多2位小数';
            }
            return null;
        }

        // ========== 核心转换 ==========
        function convert(options = {}) {
            const { isHistoryClick = false } = options;
            let rawVal = numInput.value;
            rawVal = rawVal.replace(/。/g, '.');
            const val = unformatThousands(rawVal);
            const err = validateInput(val);
            if (err) {
                setResult(err);
                setInputError(true);
                haptic();
                return;
            }
            setInputError(false);
            try {
                const res = Nzh.cn.toMoney(val);
                setResult(res);
                if (!isHistoryClick) saveHistory(val, res);
                haptic();
            } catch (e) {
                setResult('转换失败');
                setInputError(true);
            }
        }

        numInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                convert();
            }
        });

        numInput.addEventListener('blur', () => {
            let rawVal = numInput.value.trim();
            if (!rawVal) return;
            rawVal = rawVal.replace(/。/g, '.');
            const cleaned = unformatThousands(rawVal);
            if (/^-?\d+(\.\d*)?$/.test(cleaned) && cleaned.replace('-', '').replace('.', '').length > 0) {
                numInput.value = formatThousands(cleaned);
            }
        });

        numInput.addEventListener('focus', () => {
            const rawVal = numInput.value;
            const cleaned = unformatThousands(rawVal);
            if (cleaned !== rawVal) numInput.value = cleaned;
        });

        resultEl.addEventListener('click', () => {
            const text = resultEl.textContent;
            if (!text || text === '输入数字\n查看结果') return;
            navigator.clipboard.writeText(text)
                .then(() => {
                    showToast('✓ 已复制');
                    resultEl.style.transform = 'scale(1.06)';
                    setTimeout(() => { resultEl.style.transform = 'scale(1)'; }, 160);
                    haptic();
                })
                .catch(() => {
                    showToast('复制失败');
                    haptic();
                });
        });

        const STORAGE_KEY = 'nzh_history_v2';

        function saveHistory(input, output) {
            let list = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            list = list.filter(item => item.input !== input);
            list.unshift({ input, output, time: Date.now() });
            list = list.slice(0, 20);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
            renderHistory();
        }

        function deleteHistoryItem(index) {
            let list = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            if (index >= 0 && index < list.length) {
                list.splice(index, 1);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
            }
            renderHistory();
            haptic();
        }

        function clearAllHistory() {
            if (confirm('确定要清空所有历史记录吗？')) {
                localStorage.removeItem(STORAGE_KEY);
                renderHistory();
                haptic();
            }
        }

        clearHistoryBtn.addEventListener('click', clearAllHistory);

        function renderHistory() {
            const list = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            historyDiv.innerHTML = '';
            if (list.length === 0) {
                historyEmpty.style.display = 'block';
            } else {
                historyEmpty.style.display = 'none';
                list.forEach((item, idx) => {
                    const rowNumber = idx + 1;
                    const timeStr = new Date(item.time).toLocaleString('zh-CN', {
                        month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit'
                    });
                    const div = document.createElement('div');
                    div.style.cssText = 'padding:8px 0;border-bottom:1px solid #ccc;cursor:pointer;display:flex;align-items:center;';
                    const numSpan = document.createElement('span');
                    numSpan.textContent = rowNumber + '. ';
                    numSpan.style.cssText = 'color:#999;margin-right:8px;min-width:24px;text-align:right;user-select:none;';
                    div.appendChild(numSpan);
                    const leftSpan = document.createElement('span');
                    leftSpan.textContent = `${formatThousands(item.input)} → ${item.output}`;
                    leftSpan.style.flex = '1';
                    leftSpan.style.wordBreak = 'break-all';
                    div.appendChild(leftSpan);
                    const rightSpan = document.createElement('span');
                    rightSpan.innerHTML = `<span style="color:#888;font-size:12px;margin-right:8px;">${timeStr}</span><span style="color:crimson;font-weight:bold;cursor:pointer;user-select:none;" title="删除">✕</span>`;
                    div.appendChild(rightSpan);
                    rightSpan.querySelector('span:last-child').addEventListener('click', (e) => {
                        e.stopPropagation();
                        deleteHistoryItem(idx);
                    });
                    div.addEventListener('click', () => {
                        numInput.value = formatThousands(item.input);
                        convert({ isHistoryClick: true });
                        haptic();
                    });
                    historyDiv.appendChild(div);
                });
            }
        }

        // ========== 主题纹理背景 ==========
        function applyTextureBackground() {
            const dark = matchMedia('(prefers-color-scheme: dark)').matches;
            const baseColor = dark ? '#111' : '#fff';
            const dotColor = dark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.04)';
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="4" height="4">
                <rect width="4" height="4" fill="${baseColor}"/>
                <circle cx="2" cy="2" r="1" fill="${dotColor}"/>
            </svg>`;
            const encoded = encodeURIComponent(svg).replace(/'/g, "%27").replace(/"/g, "%22");
            document.body.style.backgroundImage = `url("data:image/svg+xml,${encoded}")`;
            document.body.style.backgroundSize = '4px 4px';
            document.body.style.backgroundColor = baseColor;
            document.body.classList.toggle('dark-mode', dark);
        }

        function applyTheme() {
            applyTextureBackground();
        }

        applyTheme();
        matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);

        setResult('输入数字<br>查看结果');
        renderHistory();

        // ==================== 恐龙跑酷小游戏 ====================
        const gameHeader = $('gameHeader');
        const gameToggle = $('gameToggle');
        const gameSection = $('gameSection');
        const canvas = $('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameScoreSpan = $('gameScore');
        const gameHighScoreSpan = $('gameHighScore');

        let gameRunning = false;
        let gameOver = false;
        let score = 0;
        let highScore = 0;
        let frameId = null;
        let frameCount = 0;
        let obstacleSpeed = 4;
        let nextSpawnFrame = 0;

        // 恐龙参数
        const dino = {
            x: 50,
            y: 0,
            width: 30,
            height: 30,
            vy: 0,
            grounded: true,
            jumpPower: -8,
            gravity: 0.5
        };
        const groundY = canvas.height - 30;
        dino.y = groundY - dino.height;

        let obstacles = [];

        // 读取最高分
        try {
            highScore = parseInt(localStorage.getItem('dinoHighScore')) || 0;
        } catch (e) {
            highScore = 0;
        }
        gameHighScoreSpan.textContent = '最高分: ' + highScore;

        function updateHighScore() {
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('dinoHighScore', highScore);
                gameHighScoreSpan.textContent = '最高分: ' + highScore;
            }
        }

        function resetGame() {
            dino.y = groundY - dino.height;
            dino.vy = 0;
            dino.grounded = true;
            obstacles = [];
            score = 0;
            gameOver = false;
            frameCount = 0;
            obstacleSpeed = 4;
            nextSpawnFrame = 60; // 初始1秒后出现第一个障碍
            gameScoreSpan.textContent = '得分: 0';
            gameHighScoreSpan.textContent = '最高分: ' + highScore;
        }

        function jump() {
            if (dino.grounded && !gameOver) {
                dino.vy = dino.jumpPower;
                dino.grounded = false;
            }
            if (gameOver && gameRunning) {
                resetGame();
            }
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Spacebar') {
                e.preventDefault();
                if (gameSection.style.display !== 'none' && document.activeElement !== numInput) {
                    jump();
                }
            }
        });

        canvas.addEventListener('click', (e) => {
            e.preventDefault();
            if (gameSection.style.display !== 'none') jump();
        });
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameSection.style.display !== 'none') jump();
        });

        function getDifficultyMultiplier() {
            // 分数越高，间隔越小，速度越快
            return Math.floor(score / 50); // 每50分难度上升一级
        }

        function spawnObstacle() {
            const obs = {
                x: canvas.width,
                y: groundY - 25,
                width: 15 + Math.random() * 10, // 宽度稍微随机
                height: 25
            };
            obstacles.push(obs);
        }

        function update() {
            if (gameOver) return;

            // 动态速度：基础4，每50分增加0.3，上限12
            const diff = getDifficultyMultiplier();
            obstacleSpeed = Math.min(12, 4 + diff * 0.3);

            // 恐龙物理
            dino.vy += dino.gravity;
            dino.y += dino.vy;
            if (dino.y >= groundY - dino.height) {
                dino.y = groundY - dino.height;
                dino.vy = 0;
                dino.grounded = true;
            }

            // 随机生成障碍物：间隔逐渐缩短
            if (frameCount >= nextSpawnFrame && !gameOver) {
                spawnObstacle();
                // 基础间隔80帧，随难度减少，加入随机波动
                const baseInterval = Math.max(30, 80 - diff * 3);
                const randomOffset = Math.floor(Math.random() * 20);
                nextSpawnFrame = frameCount + baseInterval + randomOffset;
            }

            // 移动障碍物
            for (let obs of obstacles) {
                obs.x -= obstacleSpeed;
            }
            obstacles = obstacles.filter(obs => obs.x + obs.width > 0);

            // 碰撞检测
            const dinoRect = { x: dino.x, y: dino.y, w: dino.width, h: dino.height };
            for (let obs of obstacles) {
                if (
                    dinoRect.x < obs.x + obs.width &&
                    dinoRect.x + dinoRect.w > obs.x &&
                    dinoRect.y < obs.y + obs.height &&
                    dinoRect.y + dinoRect.h > obs.y
                ) {
                    gameOver = true;
                    updateHighScore();
                    break;
                }
            }

            // 计分
            if (!gameOver && frameCount % 8 === 0) {
                score++;
                gameScoreSpan.textContent = '得分: ' + score;
            }

            frameCount++;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 地面
            ctx.beginPath();
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 1;
            ctx.moveTo(0, groundY);
            ctx.lineTo(canvas.width, groundY);
            ctx.stroke();

            // 恐龙
            ctx.fillStyle = gameOver ? '#888' : '#2d5a27';
            ctx.fillRect(dino.x, dino.y, dino.width, dino.height);
            ctx.fillStyle = '#fff';
            ctx.fillRect(dino.x + 18, dino.y + 8, 6, 6);
            ctx.fillStyle = '#000';
            ctx.fillRect(dino.x + 20, dino.y + 10, 3, 3);

            // 障碍物
            ctx.fillStyle = '#2d5a27';
            for (let obs of obstacles) {
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            }

            // 游戏结束画面
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = '20px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('游戏结束', canvas.width / 2, canvas.height / 2 - 10);
                ctx.font = '14px sans-serif';
                ctx.fillText('点击画面重新开始', canvas.width / 2, canvas.height / 2 + 20);
                ctx.textAlign = 'start';
            }
        }

        function gameLoop() {
            if (!gameRunning) return;
            update();
            draw();
            frameId = requestAnimationFrame(gameLoop);
        }

        function startGame() {
            if (gameRunning) return;
            gameRunning = true;
            resetGame();
            frameId = requestAnimationFrame(gameLoop);
        }

        function stopGame() {
            gameRunning = false;
            if (frameId) {
                cancelAnimationFrame(frameId);
                frameId = null;
            }
        }

        gameHeader.addEventListener('click', () => {
            const isVisible = gameSection.style.display === 'block';
            if (isVisible) {
                gameSection.style.display = 'none';
                gameToggle.textContent = '▶';
                stopGame();
            } else {
                gameSection.style.display = 'block';
                gameToggle.textContent = '▼';
                startGame();
            }
        });

        // 初始状态
        gameSection.style.display = 'none';
        gameToggle.textContent = '▶';
    </script>
</body>
</html>
