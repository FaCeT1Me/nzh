<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数字转中文金额</title>
<script src="./nzh.js"></script>
</head>

<body style="margin:0;font-family:sans-serif;">

<div style="max-width:480px;margin:0 auto;padding:20px;box-sizing:border-box;">

  <h2 style="margin-top:10px;">数字转中文金额</h2>

  <input id="num" inputmode="decimal" placeholder="输入数字"
    style="width:100%;padding:10px;font-size:16px;box-sizing:border-box;" />

  <br><br>

  <button onclick="convert()">转换</button>

  <p id="result"
     style="margin-top:20px;font-size:40px;font-weight:700;word-break:break-all;cursor:pointer;line-height:1.4;transition:transform 0.15s ease;"></p>

  <p id="toast" style="height:18px;font-size:13px;"></p>

</div>

<hr>

<div style="max-width:480px;margin:0 auto;padding:0 20px 40px;box-sizing:border-box;">

  <b>历史</b>
  <div id="history"></div>

</div>

<script>

// ===== 校验 =====
function validateInput(val){
  if(!val) return '请输入数字';

  val = val.trim();

  if(!/^-?\d+(\.\d+)?$/.test(val)){
    return '格式错误';
  }

  const pure = val.replace('-', '').replace('.', '');
  if(pure.length > 16){
    return '数字过大';
  }

  if(val.includes('.')){
    const d = val.split('.')[1];
    if(d.length > 2){
      return '最多2位小数';
    }
  }

  return null;
}

// ===== 转换 =====
function convert(){
  const val = document.getElementById('num').value;

  const err = validateInput(val);
  if(err){
    setResult(err);
    return;
  }

  let res;
  try{
    res = Nzh.cn.toMoney(val);
  }catch{
    setResult('转换失败');
    return;
  }

  setResult(res);
  saveHistory(val, res);
}

// ===== 结果 =====
function setResult(text){
  document.getElementById('result').innerText = text;
}

// ===== 点击结果（弹性回弹 + 复制）=====
const resultEl = document.getElementById('result');

resultEl.addEventListener('click', ()=>{
  const text = resultEl.innerText;
  if(!text) return;

  navigator.clipboard.writeText(text)
    .then(()=> showToast('已复制'))
    .catch(()=> showToast('复制失败'));

  // 弹性反馈
  resultEl.style.transform = 'scale(1.06)';

  setTimeout(()=>{
    resultEl.style.transform = 'scale(1)';
  }, 140);
});

// ===== 回车触发 =====
document.getElementById('num').addEventListener('keydown', e=>{
  if(e.key === 'Enter') convert();
});

// ===== toast =====
let t;
function showToast(msg){
  const el = document.getElementById('toast');
  el.innerText = msg;
  clearTimeout(t);
  t = setTimeout(()=> el.innerText='', 1000);
}

// ===== 历史 =====
const KEY = 'nzh_history';

function saveHistory(input, output){
  let list = JSON.parse(localStorage.getItem(KEY) || '[]');

  list = list.filter(i => i.input !== input);

  list.unshift({input, output});

  list = list.slice(0,10);

  localStorage.setItem(KEY, JSON.stringify(list));
  renderHistory();
}

function renderHistory(){
  const list = JSON.parse(localStorage.getItem(KEY) || '[]');
  const el = document.getElementById('history');

  el.innerHTML = list.map(i =>
    `<div style="padding:8px 0;border-bottom:1px solid #ccc;cursor:pointer;">
      ${i.input} → ${i.output}
    </div>`
  ).join('');

  Array.from(el.children).forEach((div, idx)=>{
    div.onclick = ()=>{
      document.getElementById('num').value = list[idx].input;
      convert(); // ⭐ 自动重新计算
    };
  });
}

// ===== 主题 =====
(function(){
  const dark = matchMedia('(prefers-color-scheme: dark)').matches;
  document.body.style.background = dark ? '#111' : '#fff';
  document.body.style.color = dark ? '#eee' : '#000';
})();

// 初始化
renderHistory();

</script>

</body>
</html>
